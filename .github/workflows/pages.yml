# Publish interactive kb-graph to GitHub Pages (full URL; README cannot iframe).
# Prereq: private repos need Pro/Team/Enterprise — Free only gets Pages for public repos
#   (https://docs.github.com/en/pages/getting-started-with-github-pages/about-github-pages#who-can-use-this-feature).
# Otherwise deploy-pages returns 404. If this repo stays private on Free, disable this workflow or host _site elsewhere.
# One-time: Settings → Pages → Source: GitHub Actions.
name: Deploy Pages (interactive map)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build map
        run: npm run build:graph
        env:
          CHRONO: git
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp assets/kb-graph/kb-graph-animated.html _site/index.html
          cp assets/kb-graph/kb-graph-snapshot.svg _site/snapshot.svg
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
