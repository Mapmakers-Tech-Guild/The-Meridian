name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Restore link-check cache
        uses: actions/cache@v4
        with:
          path: .link-check-cache.json
          # Exact hit when no .md files changed → 0 files re-checked (instant).
          # Prefix hit when some files changed → old cache restored, checker only
          # re-parses dirty files. Cache saved with new key after a clean run.
          key: link-check-${{ hashFiles('**/*.md') }}
          restore-keys: link-check-

      - name: Check internal links
        run: npm run check:links

      - name: Build site
        run: npm run build:site
        env:
          CHRONO: git
          SITE_BASE: /The-Meridian/

      - name: Run build smoke tests
        run: npm run test:build
