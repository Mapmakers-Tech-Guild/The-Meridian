# Optional: precompile the KB map and commit `assets/kb-graph/` back to the repo.
# This does NOT deploy GitHub Pages. The live site is built by
#   "Deploy Pages (interactive map)" (pages.yml) → `npm run build:site` → public/
#
# Run manually if you want the repo to contain up-to-date SVG/HTML previews for browsing on GitHub.
# [skip ci] avoids triggering extra workflows in many setups; Pages still deploys from your last push
# to main when you use the main deploy workflow.
name: Sync precompiled map to repo (no Pages deploy)

on:
  workflow_dispatch:

# Uncomment to also sync map assets on every push to main (creates a second “green” run per commit):
# on:
#   push:
#     branches: [main]

concurrency:
  group: kb-graph-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build map (git-weighted animation order)
        run: npm run build:graph
        env:
          CHRONO: git
          SITE_BASE: /The-Meridian/

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/kb-graph
          if git diff --staged --quiet; then
            echo "No changes to kb-graph assets."
            exit 0
          fi
          git commit -m "chore(kb-graph): sync generated map [skip ci]"
          git push

      - name: Reminder
        run: |
          echo "::notice::The live site is updated by the workflow: Deploy Pages (interactive map (pages.yml)). This job only updates committed files in assets/kb-graph/."
